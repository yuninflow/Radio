<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio — Second Brain (Lofi Cafe)</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    background: #f7f6f3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .radio-widget * { box-sizing: border-box; }
  .radio-widget {
    --surface-2: #ffffff;
    --surface-1: #f7f6f3;
    --border: #e3e1da;
    --border-strong: #d3d0c6;
    --text-primary: #1f1e1c;
    --text-secondary: #6b6a63;
    --text-muted: #9b9a92;
    --ink: #252525;
    --radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    color: var(--text-primary);
  }

  .rw-header {
    margin-bottom: 1rem;
  }
  .rw-title {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.25;
  }
  .rw-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .rw-moods {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 1rem;
  }
  .rw-mood {
    font-family: inherit;
    font-size: 12.5px;
    padding: 9px 4px;
    text-align: center;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .15s ease;
  }
  .rw-mood:hover { background: var(--surface-1); }
  .rw-mood.active {
    background: var(--ink);
    color: #ffffff;
    border-color: var(--ink);
  }

  .rw-player-frame {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface-1);
    margin-bottom: 0.9rem;
  }
  .rw-player-frame iframe {
    display: block;
    width: 100%;
    height: 220px;
    border: none;
  }

  .rw-credit {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
  }
  .rw-credit a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border-strong);
  }
</style>
</head>
<body>

<div class="radio-widget">

  <div class="rw-header">
    <div class="rw-title" id="rw-title">Chill</div>
    <div class="rw-subtitle" id="rw-subtitle">Lofi Cafe · Chilling</div>
  </div>

  <div class="rw-moods" id="rw-moods">
    <button class="rw-mood active" data-key="chill">Chill</button>
    <button class="rw-mood" data-key="ambient">Ambient</button>
    <button class="rw-mood" data-key="deep">Deep Focus</button>
    <button class="rw-mood" data-key="mellow">Mellow</button>
    <button class="rw-mood" data-key="lofi">Lo-fi</button>
  </div>

  <div class="rw-player-frame">
    <iframe id="rw-iframe" src="" title="Lofi Cafe player" allow="autoplay" loading="lazy"></iframe>
  </div>

  <div class="rw-credit">Streams vía <a href="https://loficafe.net" target="_blank" rel="noopener">Lofi Cafe</a></div>

</div>

<script>
(function(){
  const moods = {
    chill:   { label: 'Chill',       station: 'chilling',      tag: 'Chilling' },
    ambient: { label: 'Ambient',     station: 'working',       tag: 'Working' },
    deep:    { label: 'Deep Focus',  station: 'studying',      tag: 'Studying' },
    mellow:  { label: 'Mellow',      station: 'sleeping',      tag: 'Sleeping' },
    lofi:    { label: 'Lo-fi',       station: 'japanese-lofi', tag: 'Japanese Lofi' }
  };

  function paramMood(){
    const params = new URLSearchParams(window.location.search);
    const m = params.get('mood');
    return moods[m] ? m : 'chill';
  }

  const titleEl = document.getElementById('rw-title');
  const subtitleEl = document.getElementById('rw-subtitle');
  const iframe = document.getElementById('rw-iframe');
  const moodBtns = document.querySelectorAll('.rw-mood');

  function loadMood(key){
    const m = moods[key];
    moodBtns.forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.key === key);
    });
    titleEl.textContent = m.label;
    subtitleEl.textContent = 'Lofi Cafe · ' + m.tag;
    iframe.src = 'https://loficafe.net/embed/' + m.station;
  }

  moodBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      loadMood(btn.dataset.key);
    });
  });

  loadMood(paramMood());
})();
</script>

</body>
</html>
