<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio — Second Brain</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    background: #f7f6f3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .radio-widget * { box-sizing: border-box; }
  .radio-widget {
    --surface-2: #ffffff;
    --surface-1: #f7f6f3;
    --border: #e3e1da;
    --border-strong: #d3d0c6;
    --text-primary: #1f1e1c;
    --text-secondary: #6b6a63;
    --text-muted: #9b9a92;
    --ink: #252525;
    --radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    color: var(--text-primary);
  }

  .rw-now {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.1rem;
  }

  .rw-play {
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s ease;
  }
  .rw-play:hover { background: var(--surface-1); }
  .rw-play.playing {
    background: var(--ink);
    border-color: var(--ink);
  }
  .rw-play svg { width: 16px; height: 16px; }
  .rw-play .icon-play { fill: var(--text-primary); }
  .rw-play.playing .icon-play { fill: #ffffff; }
  .rw-play .icon-pause { fill: #ffffff; }

  .rw-info { min-width: 0; }
  .rw-title {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rw-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rw-live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .rw-live-dot.live {
    background: #3b6d11;
  }

  .rw-moods {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 1rem;
  }
  .rw-mood {
    font-family: inherit;
    font-size: 12.5px;
    padding: 9px 4px;
    text-align: center;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .15s ease;
  }
  .rw-mood:hover { background: var(--surface-1); }
  .rw-mood.active {
    background: var(--ink);
    color: #ffffff;
    border-color: var(--ink);
  }

  .rw-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 0.9rem;
  }
  .rw-volume {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 170px;
  }
  .rw-volume svg { width: 14px; height: 14px; flex-shrink: 0; fill: var(--text-muted); }
  .rw-volume input[type="range"] {
    flex: 1;
    accent-color: var(--ink);
  }
  .rw-credit {
    font-size: 11px;
    color: var(--text-muted);
  }
  .rw-credit a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border-strong);
  }

  .rw-unlock-overlay {
    position: fixed;
    inset: 0;
    background: rgba(37,37,37,0.06);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .rw-unlock-overlay.show { display: flex; }
  .rw-unlock-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 22px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
</style>
</head>
<body>

<div class="radio-widget">

  <div class="rw-now">
    <button class="rw-play" id="rw-play" aria-label="Reproducir">
      <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg class="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <div class="rw-info">
      <div class="rw-title" id="rw-title">Groove Salad</div>
      <div class="rw-subtitle">
        <span class="rw-live-dot" id="rw-live-dot"></span>
        <span id="rw-subtitle-text">Chill · Pausado</span>
      </div>
    </div>
  </div>

  <div class="rw-moods" id="rw-moods">
    <button class="rw-mood active" data-key="chill">Chill</button>
    <button class="rw-mood" data-key="ambient">Ambient</button>
    <button class="rw-mood" data-key="deep">Deep Focus</button>
    <button class="rw-mood" data-key="mellow">Mellow</button>
    <button class="rw-mood" data-key="lofi">Lo-fi</button>
  </div>

  <div class="rw-bottom">
    <div class="rw-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2-4.28v8.56c1.23-.99 2-2.51 2-4.28z"/></svg>
      <input type="range" id="rw-volume-slider" min="0" max="100" value="70">
    </div>
    <div class="rw-credit">Streams vía <a href="https://somafm.com" target="_blank" rel="noopener">SomaFM</a></div>
  </div>

</div>

<div class="rw-unlock-overlay" id="rw-unlock-overlay">
  <div class="rw-unlock-card">Toca en cualquier lugar para reproducir ▸</div>
</div>

<script>
(function(){
  const channels = {
    chill:   { label: 'Groove Salad',      tag: 'Chill / Downtempo',    main: 'https://ice5.somafm.com/groovesalad-128-mp3',  alt: 'https://ice3.somafm.com/groovesalad-128-mp3' },
    ambient: { label: 'Drone Zone',        tag: 'Ambient',              main: 'https://ice5.somafm.com/dronezone-128-mp3',    alt: 'https://ice3.somafm.com/dronezone-128-mp3' },
    deep:    { label: 'Deep Space One',    tag: 'Deep Focus',           main: 'https://ice5.somafm.com/deepspaceone-128-mp3', alt: 'https://ice3.somafm.com/deepspaceone-128-mp3' },
    mellow:  { label: 'Lush',              tag: 'Mellow / Vocal',       main: 'https://ice5.somafm.com/lush-128-mp3',         alt: 'https://ice3.somafm.com/lush-128-mp3' },
    lofi:    { label: 'Fluid',             tag: 'Lo-fi / Instrumental', main: 'https://ice5.somafm.com/fluid-128-mp3',        alt: 'https://ice3.somafm.com/fluid-128-mp3' }
  };

  function paramMood(){
    const params = new URLSearchParams(window.location.search);
    const m = params.get('mood');
    return channels[m] ? m : 'chill';
  }

  let activeKey = paramMood();
  let usingAlt = false;
  let playing = false;

  const audio = new Audio();
  audio.preload = 'none';

  const playBtn = document.getElementById('rw-play');
  const iconPlay = playBtn.querySelector('.icon-play');
  const iconPause = playBtn.querySelector('.icon-pause');
  const titleEl = document.getElementById('rw-title');
  const subtitleText = document.getElementById('rw-subtitle-text');
  const liveDot = document.getElementById('rw-live-dot');
  const moodBtns = document.querySelectorAll('.rw-mood');
  const volumeSlider = document.getElementById('rw-volume-slider');

  audio.volume = volumeSlider.value / 100;

  function updateInfo(status){
    const ch = channels[activeKey];
    titleEl.textContent = ch.label;
    subtitleText.textContent = ch.tag + ' · ' + status;
  }

  function setPlayingUI(isPlaying){
    playing = isPlaying;
    playBtn.classList.toggle('playing', isPlaying);
    iconPlay.style.display = isPlaying ? 'none' : 'block';
    iconPause.style.display = isPlaying ? 'block' : 'none';
    liveDot.classList.toggle('live', isPlaying);
    updateInfo(isPlaying ? 'En vivo' : 'Pausado');
  }

  function loadChannel(key, autoplay){
    activeKey = key;
    usingAlt = false;
    moodBtns.forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.key === key);
    });
    audio.src = channels[key].main;
    updateInfo(autoplay ? 'Cargando…' : 'Pausado');
    if(autoplay){
      audio.play().then(function(){
        hideUnlockOverlay();
      }).catch(function(){
        showUnlockOverlay();
      });
    }
  }

  const unlockOverlay = document.getElementById('rw-unlock-overlay');

  function showUnlockOverlay(){
    unlockOverlay.classList.add('show');
  }

  function hideUnlockOverlay(){
    unlockOverlay.classList.remove('show');
  }

  unlockOverlay.addEventListener('click', function(){
    audio.play().then(function(){
      hideUnlockOverlay();
    }).catch(function(){ /* si vuelve a fallar, se queda visible */ });
  });

  audio.addEventListener('playing', function(){
    setPlayingUI(true);
    hideUnlockOverlay();
  });

  audio.addEventListener('pause', function(){
    setPlayingUI(false);
  });

  audio.addEventListener('error', function(){
    if(!usingAlt){
      usingAlt = true;
      audio.src = channels[activeKey].alt;
      if(playing) audio.play().catch(function(){});
    } else {
      updateInfo('No disponible');
    }
  });

  playBtn.addEventListener('click', function(){
    if(playing){
      audio.pause();
    } else {
      if(!audio.src){ audio.src = channels[activeKey].main; }
      updateInfo('Cargando…');
      audio.play().catch(function(){ updateInfo('No disponible'); });
    }
  });

  moodBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      if(btn.dataset.key === activeKey) return;
      loadChannel(btn.dataset.key, playing);
    });
  });

  volumeSlider.addEventListener('input', function(){
    audio.volume = volumeSlider.value / 100;
  });

  moodBtns.forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.key === activeKey);
  });
  const params = new URLSearchParams(window.location.search);
  const shouldAutoplay = params.get('autoplay') === '1';
  updateInfo('Pausado');
  if(shouldAutoplay){
    loadChannel(activeKey, true);
  }
})();
</script>

</body>
</html>
